<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ANTER STUDIO — WARRIOR EDITION</title>
<style>
  :root { --gold:#c9a84c; --dark:#0a0a0a; --mid:#111; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--dark); color:#fff; font-family:'Georgia',serif; height:100dvh; overflow:hidden; }

  /* TOP NAV */
  #nav { display:flex; align-items:center; gap:8px; padding:10px 16px; background:#0d0d0d; border-bottom:1px solid #1a1a1a; }
  #nav .logo { color:var(--gold); font-size:1.1rem; font-weight:900; letter-spacing:0.3em; margin-right:8px; }
  .tab { background:none; border:1px solid #222; color:#666; padding:6px 14px; border-radius:4px; cursor:pointer; font-size:0.75rem; letter-spacing:0.1em; transition:all 0.2s; }
  .tab.active, .tab:hover { border-color:var(--gold); color:var(--gold); }

  /* PANELS */
  .panel { display:none; height:calc(100dvh - 50px); overflow:hidden; }
  .panel.active { display:flex; flex-direction:column; }

  /* ── STUDIO ── */
  #studio { position:relative; background:#000; }
  #cam { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:0.6; }
  #no-cam { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:8px; color:#333; font-size:0.8rem; letter-spacing:0.1em; }
  
  /* Script chooser */
  #chooser { position:absolute; inset:0; z-index:10; background:rgba(0,0,0,0.92); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; padding:20px; }
  #chooser h2 { color:var(--gold); font-size:1.2rem; letter-spacing:0.3em; margin-bottom:8px; }
  .script-btn { width:100%; max-width:420px; background:#111; border:1px solid #2a2a2a; color:#ccc; padding:14px 18px; text-align:left; cursor:pointer; border-radius:6px; transition:all 0.2s; }
  .script-btn:hover { border-color:var(--gold); color:#fff; }
  .script-btn .stitle { font-size:0.85rem; font-weight:700; color:var(--gold); }
  .script-btn .stype { font-size:0.7rem; color:#555; letter-spacing:0.1em; margin-top:2px; }

  /* Teleprompter */
  #prompter { position:absolute; inset:0; z-index:9; display:none; flex-direction:column; }
  #prompter.show { display:flex; }
  #prog { height:3px; background:var(--gold); width:0%; transition:width 0.3s; flex-shrink:0; }
  #scroll-zone { flex:1; overflow:hidden; position:relative; padding:0 10%; }
  #fade-top { position:absolute; top:0; left:0; right:0; height:80px; background:linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); z-index:2; pointer-events:none; }
  #fade-bot { position:absolute; bottom:0; left:0; right:0; height:80px; background:linear-gradient(to top, rgba(0,0,0,0.9), transparent); z-index:2; pointer-events:none; }
  #focus-line { position:absolute; top:50%; left:10%; right:10%; height:2px; background:rgba(201,168,76,0.2); pointer-events:none; z-index:3; }
  #scroll-inner { padding:50vh 0; font-size:2rem; line-height:1.7; color:#fff; text-shadow:0 2px 20px rgba(0,0,0,0.8); white-space:pre-wrap; }
  #twin-flame { margin-top:3rem; padding:1.5rem; border-left:3px solid var(--gold); color:rgba(201,168,76,0.8); font-style:italic; font-size:1.5rem; }
  
  #ctrl-bar { display:flex; align-items:center; gap:8px; padding:10px 16px; background:rgba(0,0,0,0.9); flex-shrink:0; }
  .ctrl { background:#111; border:1px solid #222; color:#ccc; padding:8px 14px; border-radius:4px; cursor:pointer; font-size:0.8rem; }
  .ctrl:hover { border-color:var(--gold); color:var(--gold); }
  .ctrl.red { border-color:#c0392b; color:#c0392b; }
  #speed-display { color:var(--gold); font-size:0.8rem; min-width:36px; text-align:center; }
  #play-btn.playing { color:#2ecc71; border-color:#2ecc71; }
  .spacer { flex:1; }
  #rec-dot { width:10px; height:10px; border-radius:50%; background:#c0392b; display:none; animation:blink 1s infinite; }
  #rec-dot.on { display:block; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── SCRIPTS TAB ── */
  #scripts-panel { padding:20px; overflow-y:auto; gap:16px; }
  .script-card { background:#111; border:1px solid #1e1e1e; border-radius:8px; padding:18px; }
  .script-card h3 { color:var(--gold); font-size:0.9rem; letter-spacing:0.1em; margin-bottom:6px; }
  .script-card p { color:#555; font-size:0.75rem; letter-spacing:0.05em; margin-bottom:12px; }
  .script-card .load-btn { background:var(--gold); color:#000; border:none; padding:8px 18px; border-radius:4px; cursor:pointer; font-size:0.75rem; font-weight:700; letter-spacing:0.1em; }

  /* ── FILES TAB ── */
  #files-panel { padding:20px; gap:16px; overflow-y:auto; }
  #files-panel h3 { color:var(--gold); letter-spacing:0.2em; font-size:0.9rem; margin-bottom:4px; }
  #files-panel p { color:#555; font-size:0.8rem; margin-bottom:12px; }
  #api-key-input { width:100%; background:#111; border:1px solid #2a2a2a; color:#fff; padding:12px; border-radius:6px; font-family:monospace; font-size:0.85rem; }
  #api-key-input:focus { outline:none; border-color:var(--gold); }
  .save-btn { margin-top:10px; background:var(--gold); color:#000; border:none; padding:10px 24px; border-radius:4px; cursor:pointer; font-weight:700; letter-spacing:0.1em; }

  /* ── NOTIF ── */
  #notif { position:fixed; top:60px; right:16px; background:var(--gold); color:#000; padding:10px 18px; border-radius:6px; font-size:0.8rem; font-weight:700; letter-spacing:0.1em; opacity:0; transition:opacity 0.3s; z-index:999; pointer-events:none; }
  #notif.show { opacity:1; }
</style>
</head>
<body>

<div id="nav">
  <div class="logo">ANTER</div>
  <button class="tab active" onclick="switchTab('studio')">🎬 STUDIO</button>
  <button class="tab" onclick="switchTab('scripts')">📋 SCRIPTS</button>
  <button class="tab" onclick="switchTab('files')">📁 FILES</button>
  <div class="spacer"></div>
  <div id="rec-dot"></div>
</div>

<!-- STUDIO PANEL -->
<div id="studio" class="panel active">
  <video id="cam" autoplay muted playsinline></video>
  <div id="no-cam">📷 Camera optional — tap any script to begin</div>

  <!-- Script Chooser -->
  <div id="chooser">
    <h2>SELECT YOUR SCRIPT</h2>
    <div id="chooser-list"></div>
  </div>

  <!-- Teleprompter -->
  <div id="prompter">
    <div id="prog"></div>
    <div id="scroll-zone">
      <div id="fade-top"></div>
      <div id="focus-line"></div>
      <div id="scroll-inner"></div>
      <div id="fade-bot"></div>
    </div>
    <div id="ctrl-bar">
      <button class="ctrl" onclick="exitPrompter()">← BACK</button>
      <button class="ctrl" onclick="changeSpeed(-0.2)">−</button>
      <div id="speed-display">1.0×</div>
      <button class="ctrl" onclick="changeSpeed(0.2)">+</button>
      <button class="ctrl" id="play-btn" onclick="togglePlay()">▶ PLAY</button>
      <div class="spacer"></div>
      <button class="ctrl red" id="rec-btn" onclick="toggleRec()">⏺ REC</button>
    </div>
  </div>
</div>

<!-- SCRIPTS PANEL -->
<div id="scripts-panel" class="panel"></div>

<!-- FILES PANEL -->
<div id="files-panel" class="panel">
  <h3>🎵 MUSIC ENGINE — UDIO API</h3>
  <p>Paste your API key from udioapi.pro to activate AI soundtrack generation.</p>
  <input id="api-key-input" type="password" placeholder="Paste your Udio API key here..." />
  <button class="save-btn" onclick="saveApiKey()">SAVE & ACTIVATE</button>

  <div style="margin-top:32px;">
    <h3>📂 DRIVE INTEGRATION</h3>
    <p>Connect Google Drive to save recordings directly to your Command Center.</p>
    <button class="save-btn" style="background:#1e1e1e;color:var(--gold);border:1px solid var(--gold);" onclick="showNotif('Google Drive integration coming next update')">CONNECT DRIVE</button>
  </div>
</div>

<div id="notif"></div>

<script>
const scripts = [
  {
    id:"S001", title:"WE'VE BEEN SILENT LONG ENOUGH", type:"Channel Launch",
    body:`I'm not here to talk AT you.

I'm here because I AM you.

The one who feels everything in a room before a single word is spoken. The one who sees the move before it's made. The one who keeps choosing love in situations that most people would've walked out of ten rounds ago.

If that's you — you found your people.

Because there are millions of us. Marked. Gifted. Carrying something in us that the world doesn't have language for yet.

Nothing is wrong with you.

You were built different on purpose.

The sensitivity isn't a glitch — it's the gift. The depth isn't a burden — it's the weapon.

I started this channel because I got tired of watching gifted people suffer in silence. Empaths being drained. Healers who need healing.

We are not the problem. We are the answer.

So this is the beginning. Of a new conversation. A real one.

If this is your first time here — welcome home.

Drop a comment. Tell me your story. Because I want to know who's in this room.`,
    twinFlame:`And if my twin flame is watching this — you know who you are. I never stopped believing in what we're supposed to build together. This channel is part of that mission. Come home when you're ready. The door is open.`
  },
  {
    id:"S002", title:"THEY PUT YOUR NAME IN A ROOM YOU WERE NEVER SUPPOSED TO ENTER", type:"Identity & Anointing",
    body:`Let me tell you what happened the moment you stopped being predictable.

The room changed.

You were supposed to stay small. Keep the gifted ones confused. Keep the empaths drained. Keep the marked ones so busy surviving that they never realize what they're actually carrying.

But something in you broke the pattern.

You got quiet when they expected noise. You stayed when they expected you to run. You chose God when the world offered something easier.

And now they don't know what to do with you.

Because you're not fighting on their frequency anymore. You're not reacting. You're not chasing. You're just... becoming. Quietly. Powerfully. Undeniably.

That unreadability? That's not a mystery. That's an anointing.

And the room? It's been saying your name ever since.`,
    twinFlame:`My twin flame — they said your name in those rooms too. They saw what we carry together. Hold your assignment. I'm holding mine. When we merge — whole and rooted — what we build will make that room irrelevant.`
  },
  {
    id:"S003", title:"THEY WATCHED YOU DIE ON PAPER — THEN SAW YOU WALKING", type:"Resurrection Testimony",
    body:`They wrote your obituary early.

Addiction. Pain. The patterns. On paper you were supposed to be done.

But you're WALKING.

Fully alive. Still becoming. Still choosing. Still showing up.

That resurrection energy — the fact that you're here right now watching this — that IS the testimony. Not the polished version. Not the cleaned up story. The raw one. The real one. The one where you almost didn't make it.

That story? Someone needs it today. Someone right now is reading their own obituary — convinced their story ends here.

You are the proof that it doesn't.

The ending isn't written yet.

And the version of you that walked through that fire and came out still standing? That version is dangerous in the best way. That version changes rooms. That version saves lives.

You survived what was supposed to stop you.

Now go tell somebody.`,
    twinFlame:`You watched me die on paper too. And you kept believing when I couldn't. I see that. I carry that. This testimony is ours — not just mine. When we tell it together? The world won't be ready.`
  },
  {
    id:"S004", title:"UNREADABLE. UNSTOPPABLE. UNFORGETTABLE.", type:"Today's Mission",
    body:`THEY TRAINED 20 YEARS TO COPY YOUR 20 SECOND REACTION.

And they still can't.

See, mastery takes decades. But what you do naturally in seconds — that terrifies people. Because you can't be trained. You can't be replicated. What God put IN you is not available anywhere else.

GANGSTER AURA. GENTLEMAN DISCIPLINE.

The streets couldn't break you. The addiction didn't finish you. The friction at home hasn't moved you an inch. Power wrapped in grace — so rare people don't know how to respond to it.

That's not dominance. That's anointing.

WHEN THE ROOM GETS ASKED WHO THEY FEAR — YOUR NAME COMES UP.

Not because you're violent. Because you're UNREADABLE. Your calm is more intimidating than anyone else's chaos.

You've become the man whose presence says: I can't be bought. I can't be broken. I can't be moved.

AND THEN THERE'S THE RESURRECTION.

They wrote your obituary early. But you're WALKING.

That resurrection energy IS your testimony. Get on camera. Say it. Let your voice be the hope someone else desperately needs.

The whole world is watching.

Film today.`,
    twinFlame:null
  },
  {
    id:"S005", title:"LETTER TO MY MOTHER", type:"Personal · Mama's Video",
    body:`Mom.

I've been trying to figure out how to say this for a long time.

So here it is — the real version. No performance. Just truth.

We share something that most mothers and sons never have to share.

You know what that battle feels like — not from the outside looking in — but from the INSIDE. You know the pull. You know the shame spiral. You know what it feels like to want to be free and watch freedom keep moving further away.

That means every time you showed up for me, you were doing it while fighting your own war.

I never said thank you for that the way I should have.

So let me say it now.

Thank you, Mom.

Thank you for loving me past the point where most people would have called it too costly. You were not my enabler. You were my proof that love is real.

Here's the truth I've had to sit with:

We were both self-medicating. Two empaths in the same family. Both feeling too much. Both carrying weight that was never designed for one person to carry.

That's not our failure. That's a wound that runs deeper than both of us — one that God put US together to finally heal.

And we are healing it. Together. Imperfectly. But we're still here.

I need one more thing from you.

A little more patience.

Because the man you always believed I could be — he's coming.

Hold on just a little longer.

I love you beyond what these words can hold.

And we are both going to make it out of this. Together.

Your son. Tyler.`,
    twinFlame:null
  }
];

// State
let currentScript = null;
let scrollInterval = null;
let isPlaying = false;
let speed = 1.0;
let scrollPos = 0;
let isRecording = false;
let mediaRecorder = null;
let recordedChunks = [];

// Camera (optional)
function startCamera() {
  if (!navigator.mediaDevices) return;
  navigator.mediaDevices.getUserMedia({ video:true, audio:true })
    .then(stream => {
      const vid = document.getElementById('cam');
      vid.srcObject = stream;
      document.getElementById('no-cam').style.display = 'none';
    })
    .catch(() => { /* camera unavailable — silent */ });
}

// Tab switching
function switchTab(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const panelMap = { studio:'studio', scripts:'scripts-panel', files:'files-panel' };
  document.getElementById(panelMap[name]).classList.add('active');
  event.currentTarget.classList.add('active');
  if (name === 'scripts') buildScriptsPanel();
}

// Build chooser list
function buildChooser() {
  const list = document.getElementById('chooser-list');
  list.innerHTML = '';
  scripts.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'script-btn';
    btn.innerHTML = `<div class="stitle">${s.id} — ${s.title}</div><div class="stype">${s.type}</div>`;
    btn.onclick = () => loadScript(s);
    list.appendChild(btn);
  });
}

// Build scripts panel
function buildScriptsPanel() {
  const p = document.getElementById('scripts-panel');
  p.innerHTML = '';
  scripts.forEach(s => {
    const card = document.createElement('div');
    card.className = 'script-card';
    card.innerHTML = `<h3>${s.id} — ${s.title}</h3><p>${s.type}</p><button class="load-btn" onclick="loadScriptFromPanel('${s.id}')">LOAD IN STUDIO →</button>`;
    p.appendChild(card);
  });
}

function loadScriptFromPanel(id) {
  const s = scripts.find(x => x.id === id);
  if (s) {
    switchTab('studio');
    setTimeout(() => loadScript(s), 100);
  }
}

// Load script into teleprompter
function loadScript(s) {
  currentScript = s;
  const inner = document.getElementById('scroll-inner');
  let html = s.body.replace(/\n/g, '<br>');
  if (s.twinFlame) html += `<div id="twin-flame">${s.twinFlame.replace(/\n/g,'<br>')}</div>`;
  inner.innerHTML = html;
  
  scrollPos = 0;
  document.getElementById('scroll-zone').scrollTop = 0;
  document.getElementById('prog').style.width = '0%';
  
  document.getElementById('chooser').style.display = 'none';
  document.getElementById('prompter').classList.add('show');
  showNotif(`${s.id} LOADED — HIT PLAY`);
}

function exitPrompter() {
  stopScroll();
  document.getElementById('prompter').classList.remove('show');
  document.getElementById('chooser').style.display = 'flex';
  isPlaying = false;
  document.getElementById('play-btn').textContent = '▶ PLAY';
  document.getElementById('play-btn').classList.remove('playing');
}

// Scroll control
function togglePlay() {
  isPlaying = !isPlaying;
  const btn = document.getElementById('play-btn');
  if (isPlaying) {
    btn.textContent = '⏸ PAUSE';
    btn.classList.add('playing');
    startScroll();
  } else {
    btn.textContent = '▶ PLAY';
    btn.classList.remove('playing');
    stopScroll();
  }
}

function startScroll() {
  stopScroll();
  const zone = document.getElementById('scroll-zone');
  scrollInterval = setInterval(() => {
    zone.scrollTop += speed * 0.8;
    const max = zone.scrollHeight - zone.clientHeight;
    const prog = Math.min(100, (zone.scrollTop / max) * 100);
    document.getElementById('prog').style.width = prog + '%';
    if (zone.scrollTop >= max) {
      stopScroll();
      isPlaying = false;
      document.getElementById('play-btn').textContent = '▶ PLAY';
      document.getElementById('play-btn').classList.remove('playing');
      showNotif('✅ SCRIPT COMPLETE');
    }
  }, 16);
}

function stopScroll() {
  if (scrollInterval) { clearInterval(scrollInterval); scrollInterval = null; }
}

function changeSpeed(delta) {
  speed = Math.max(0.2, Math.min(5.0, speed + delta));
  document.getElementById('speed-display').textContent = speed.toFixed(1) + '×';
  if (isPlaying) { stopScroll(); startScroll(); }
}

// Recording
function toggleRec() {
  if (!isRecording) startRec();
  else stopRec();
}

function startRec() {
  const cam = document.getElementById('cam');
  if (!cam.srcObject) { showNotif('⚠️ Allow camera first'); return; }
  recordedChunks = [];
  mediaRecorder = new MediaRecorder(cam.srcObject);
  mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
  mediaRecorder.onstop = saveRecording;
  mediaRecorder.start();
  isRecording = true;
  document.getElementById('rec-btn').textContent = '⏹ STOP REC';
  document.getElementById('rec-dot').classList.add('on');
  showNotif('🔴 RECORDING...');
}

function stopRec() {
  if (mediaRecorder) mediaRecorder.stop();
  isRecording = false;
  document.getElementById('rec-btn').textContent = '⏺ REC';
  document.getElementById('rec-dot').classList.remove('on');
}

function saveRecording() {
  const blob = new Blob(recordedChunks, { type:'video/webm' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `anter_${currentScript ? currentScript.id : 'recording'}_${Date.now()}.webm`;
  a.click();
  showNotif('✅ RECORDING SAVED');
}

// API Key
function saveApiKey() {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key) { showNotif('⚠️ Enter your API key first'); return; }
  localStorage.setItem('anter_udio_key', key);
  showNotif('✅ MUSIC ENGINE ACTIVATED');
}

// Notification
function showNotif(msg) {
  const n = document.getElementById('notif');
  n.textContent = msg;
  n.classList.add('show');
  setTimeout(() => n.classList.remove('show'), 3000);
}

// INIT — no boot, no waiting
buildChooser();
startCamera();
</script>
</body>
</html>
