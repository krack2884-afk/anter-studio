<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ANTER STUDIO — WARRIOR EDITION</title>
<style>
  :root { --gold:#c9a84c; --dark:#0a0a0a; --mid:#111; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--dark); color:#fff; font-family:'Georgia',serif; height:100dvh; overflow:hidden; }

  #nav { display:flex; align-items:center; gap:8px; padding:10px 16px; background:#0d0d0d; border-bottom:1px solid #1a1a1a; }
  #nav .logo { color:var(--gold); font-size:1.1rem; font-weight:900; letter-spacing:0.3em; margin-right:8px; }
  .tab { background:none; border:1px solid #222; color:#666; padding:6px 14px; border-radius:4px; cursor:pointer; font-size:0.75rem; letter-spacing:0.1em; transition:all 0.2s; }
  .tab.active, .tab:hover { border-color:var(--gold); color:var(--gold); }

  .panel { display:none; height:calc(100dvh - 50px); overflow:hidden; }
  .panel.active { display:flex; flex-direction:column; }

  #studio { position:relative; background:#000; }
  #cam { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:0.6; }
  #no-cam { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:8px; color:#333; font-size:0.8rem; letter-spacing:0.1em; }

  #chooser { position:absolute; inset:0; z-index:10; background:rgba(0,0,0,0.92); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; padding:20px; overflow-y:auto; }
  #chooser h2 { color:var(--gold); font-size:1.2rem; letter-spacing:0.3em; margin-bottom:8px; }
  .script-btn { width:100%; max-width:420px; background:#111; border:1px solid #2a2a2a; color:#ccc; padding:14px 18px; text-align:left; cursor:pointer; border-radius:6px; transition:all 0.2s; }
  .script-btn:hover { border-color:var(--gold); color:#fff; }
  .script-btn .stitle { font-size:0.85rem; font-weight:700; color:var(--gold); }
  .script-btn .stype { font-size:0.7rem; color:#555; letter-spacing:0.1em; margin-top:2px; }

  #prompter { position:absolute; inset:0; z-index:9; display:none; flex-direction:column; }
  #prompter.show { display:flex; }
  #prog { height:3px; background:var(--gold); width:0%; transition:width 0.3s; flex-shrink:0; }
  #scroll-zone { flex:1; overflow:hidden; position:relative; padding:0 10%; }
  #fade-top { position:absolute; top:0; left:0; right:0; height:80px; background:linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); z-index:2; pointer-events:none; }
  #fade-bot { position:absolute; bottom:0; left:0; right:0; height:80px; background:linear-gradient(to top, rgba(0,0,0,0.9), transparent); z-index:2; pointer-events:none; }
  #focus-line { position:absolute; top:50%; left:10%; right:10%; height:2px; background:rgba(201,168,76,0.2); pointer-events:none; z-index:3; }
  #scroll-inner { padding:50vh 0; font-size:2rem; line-height:1.8; color:#fff; text-shadow:0 2px 20px rgba(0,0,0,0.8); white-space:pre-wrap; }
  #twin-flame { margin-top:3rem; padding:1.5rem; border-left:3px solid var(--gold); color:rgba(201,168,76,0.8); font-style:italic; font-size:1.6rem; line-height:1.8; }

  #ctrl-bar { display:flex; align-items:center; gap:8px; padding:10px 16px; background:rgba(0,0,0,0.9); flex-shrink:0; }
  .ctrl { background:#111; border:1px solid #222; color:#ccc; padding:8px 14px; border-radius:4px; cursor:pointer; font-size:0.8rem; }
  .ctrl:hover { border-color:var(--gold); color:var(--gold); }
  .ctrl.red { border-color:#c0392b; color:#c0392b; }
  #speed-display { color:var(--gold); font-size:0.8rem; min-width:36px; text-align:center; }
  #play-btn.playing { color:#2ecc71; border-color:#2ecc71; }
  .spacer { flex:1; }
  #rec-dot { width:10px; height:10px; border-radius:50%; background:#c0392b; display:none; animation:blink 1s infinite; }
  #rec-dot.on { display:block; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  #scripts-panel { padding:20px; overflow-y:auto; gap:16px; }
  .script-card { background:#111; border:1px solid #1e1e1e; border-radius:8px; padding:18px; margin-bottom:16px; }
  .script-card h3 { color:var(--gold); font-size:0.9rem; letter-spacing:0.1em; margin-bottom:6px; }
  .script-card p { color:#555; font-size:0.75rem; letter-spacing:0.05em; margin-bottom:12px; }
  .script-card .load-btn { background:var(--gold); color:#000; border:none; padding:8px 18px; border-radius:4px; cursor:pointer; font-size:0.75rem; font-weight:700; letter-spacing:0.1em; }

  #files-panel { padding:20px; gap:16px; overflow-y:auto; }
  #files-panel h3 { color:var(--gold); letter-spacing:0.2em; font-size:0.9rem; margin-bottom:4px; }
  #files-panel p { color:#555; font-size:0.8rem; margin-bottom:12px; }
  #api-key-input { width:100%; background:#111; border:1px solid #2a2a2a; color:#fff; padding:12px; border-radius:6px; font-family:monospace; font-size:0.85rem; }
  .save-btn { margin-top:10px; background:var(--gold); color:#000; border:none; padding:10px 24px; border-radius:4px; cursor:pointer; font-weight:700; letter-spacing:0.1em; }

  #notif { position:fixed; top:60px; right:16px; background:var(--gold); color:#000; padding:10px 18px; border-radius:6px; font-size:0.8rem; font-weight:700; letter-spacing:0.1em; opacity:0; transition:opacity 0.3s; z-index:999; pointer-events:none; }
  #notif.show { opacity:1; }
</style>
</head>
<body>

<div id="nav">
  <div class="logo">ANTER</div>
  <button class="tab active" onclick="switchTab('studio', this)">🎬 STUDIO</button>
  <button class="tab" onclick="switchTab('scripts', this)">📋 SCRIPTS</button>
  <button class="tab" onclick="switchTab('files', this)">📁 FILES</button>
  <div class="spacer"></div>
  <div id="rec-dot"></div>
</div>

<div id="studio" class="panel active">
  <video id="cam" autoplay muted playsinline></video>
  <div id="no-cam">📷 Camera optional — tap any script to begin</div>
  <div id="chooser">
    <h2>SELECT YOUR SCRIPT</h2>
    <div id="chooser-list"></div>
  </div>
  <div id="prompter">
    <div id="prog"></div>
    <div id="scroll-zone">
      <div id="fade-top"></div>
      <div id="focus-line"></div>
      <div id="scroll-inner"></div>
      <div id="fade-bot"></div>
    </div>
    <div id="ctrl-bar">
      <button class="ctrl" onclick="exitPrompter()">← BACK</button>
      <button class="ctrl" onclick="changeSpeed(-0.2)">−</button>
      <div id="speed-display">1.0×</div>
      <button class="ctrl" onclick="changeSpeed(0.2)">+</button>
      <button class="ctrl" id="play-btn" onclick="togglePlay()">▶ PLAY</button>
      <div class="spacer"></div>
      <button class="ctrl red" id="rec-btn" onclick="toggleRec()">⏺ REC</button>
    </div>
  </div>
</div>

<div id="scripts-panel" class="panel"></div>

<div id="files-panel" class="panel">
  <h3>🎵 MUSIC ENGINE — UDIO API</h3>
  <p>Paste your API key from udioapi.pro to activate AI soundtrack generation.</p>
  <input id="api-key-input" type="password" placeholder="Paste your Udio API key here..." />
  <button class="save-btn" onclick="saveApiKey()">SAVE & ACTIVATE</button>
</div>

<div id="notif"></div>

<script>
const scripts = [
  {
    id:"S001", title:"I USED TO THINK SOMETHING WAS WRONG WITH ME", type:"Channel Intro — Who You're Talking To",
    body:`I used to think something was wrong with me.

Like — why do I feel everything so hard? Why can't I just let things go like other people seem to?

Someone would say something offhand at a family dinner and I'd be up at 2am still turning it over in my head. My wife would be upset and even if I didn't know why, I could feel it in my whole body before she said a word.

I thought that was a flaw. For a long time, I tried to turn it off.

That's actually how I ended up where I ended up. The using, the chaos — a lot of that was me trying to find the off switch for something I didn't understand yet.

What I know now is that there is no off switch. And I don't want one anymore.

Because that same thing that made me feel everything so intensely? It's also why I can sit with someone in their worst moment and they don't feel alone. It's why I can love people through things that most people would walk away from.

I'm not broken. I'm built for something specific.

And if you've ever felt what I'm describing — like you feel too much, like you care too hard, like you keep choosing love even when it costs you —

You're not broken either.

That's what this channel is. Me figuring out what it means to carry this thing with purpose instead of pain.

I'm glad you're here.`,
    twinFlame:`And to my wife — if you're watching this. You've seen every version of me. The one that was lost, the one that was trying, and this one right here. I meant what I said. I'm not going anywhere. I'm just finally becoming who I was supposed to be. And I want that for us. Both of us.`
  },
  {
    id:"S002", title:"THE MOMENT I STOPPED TRYING TO WIN THE ARGUMENT", type:"Relationship — The Turning Point",
    body:`There was this moment — and I remember exactly where I was standing in the house — where I realized I had been trying to win every single argument.

Not out loud necessarily. But in my head, I was keeping score. I was building my case. Collecting evidence. Waiting for her to finally see that I was right.

And it hit me one day — I have never once won an argument that way. Not really. Even the times I "won" — she'd go quiet, I'd feel this hollow thing in my chest, and we'd both just... go to our corners. Nothing actually got better.

So I tried something different.

I stopped trying to win. I stopped defending myself in real time. When she came at me with something that felt unfair, instead of firing back, I just got quiet. Not cold quiet. Not icing her out. Just — I took a breath and I said something like, "I hear you. I'm not going to fight about this."

The first few times she didn't know what to do with that. Honestly, neither did I.

But over time something started to shift. Because when I stopped reacting, I stopped giving the conflict what it needed to keep going. And she started — slowly — to meet me somewhere different.

I'm not saying it fixed everything overnight. It didn't. We're still in the middle of it.

But I'll tell you this — the most powerful thing I've ever done in my marriage wasn't something I said.

It was something I didn't say.

That's what I'm talking about on this channel. The moves nobody teaches you.`,
    twinFlame:null
  },
  {
    id:"S003", title:"MY MOM AND I BOTH ALMOST DIDN'T MAKE IT", type:"Testimony — Addiction & Survival",
    body:`I've never said this on camera before.

My mom and I — we both struggled with addiction. At the same time. Different substances, same war. And there were moments where I genuinely didn't know which one of us was going to make it.

I used to feel a lot of shame about that. Like I was supposed to be stronger. Like I should've had it together.

What I understand now — and this took me a long time — is that both of us were feeling too much and had no language for it. We're both empaths. We absorb everything around us. And at some point, the weight of that gets so heavy that you start looking for anything that'll turn the volume down.

I'm not making excuses. I'm telling you what was actually happening underneath it.

Because there are people watching this right now who are in that same place. Numbing something they don't have words for yet. And they think the problem is them — their weakness, their character, their worth.

It's not.

You're not weak. You're overloaded. There's a difference.

My mom and I are both still here. Both still in the work. And the fact that we went through that together — there's a strange kind of bond in that. She didn't judge me because she knew the pull firsthand.

If you're in it right now — I'm not going to tell you it's easy to get out. But I'm going to tell you that who you are underneath the thing you're using to survive?

That person is worth fighting for.

I know because I almost lost him. And I'm really glad I didn't.`,
    twinFlame:null
  },
  {
    id:"S004", title:"WHAT NOBODY TELLS YOU ABOUT LOVING SOMEONE WHO HURTS YOU", type:"Empath & Relationships — The Hard Truth",
    body:`Nobody prepares you for what it's like to love someone who also hurts you.

Not in the movies. Not in church. Not in therapy — at least not right away.

Because the default answer when someone keeps hurting you is: leave. Set boundaries. Protect yourself.

And I'm not saying that's wrong. Sometimes it is the right call.

But for me — and I think for a lot of people who are wired the way I'm wired — it's not that simple. Because I can feel who she is underneath the patterns. I can feel the version of her that's fighting to get out. And walking away from that feels like abandoning someone in a burning building.

So what do you do with that?

What I've had to learn — the hard way, over and over — is that I can stay AND have a spine.

I can love her fully and still refuse to absorb the hit. I can be present and still be grounded. I can stay committed to the marriage AND committed to not losing myself in it.

That balance is the hardest thing I've ever tried to do.

Some days I nail it. Some days I fall back into the old pattern — reacting, defending, shrinking.

But here's what I keep coming back to: the fact that I can feel her pain without becoming it — that's not weakness. That's actually the thing that gives me the best shot at helping her through it.

I'm not her therapist. I'm her husband.

But I can choose to be steady when she can't be. Not because I'm a pushover — because I've decided that's who I want to be.

That decision changed everything.`,
    twinFlame:`Baby — I know you're fighting your own war inside. I see it. I'm not leaving. I'm just learning how to love you better. That's all this is.`
  },
  {
    id:"S005", title:"LETTER TO MY MOTHER", type:"Personal — Mama's Video",
    body:`Mom.

I've been sitting with this for a while trying to figure out how to say it right.

So I'm just going to say it.

You were not my enabler. I know that's what people called it. I know you've probably called yourself that in your own head more times than I can count.

But that's not what you were.

You were a woman who watched her son disappearing and refused to let go. You caught me every time. Not because you were weak — because you loved me in a way that didn't know how to give up.

And here's what I haven't said out loud before:

You were fighting your own version of the same battle. We both were. Two people in the same bloodline, feeling everything too deeply and not knowing what to do with it.

That's not something to be ashamed of. That's something I think God put us through together so we could come out the other side with something real to say.

I need you to stop carrying the guilt. I need you to put it down.

Because the version of me that's standing here right now — the one that's healing, the one that's building something, the one who still calls you first when something big happens — he exists because of you. Not despite you.

I just need a little more time. A little more patience.

I know you're tired. I know you've been holding your breath for years waiting for the other shoe to drop.

I'm telling you — you can exhale.

I'm going to be okay.

We're both going to be okay.

I love you, Mom. More than I know how to say.`,
    twinFlame:null
  }
];

let currentScript = null;
let scrollInterval = null;
let isPlaying = false;
let speed = 1.0;
let isRecording = false;
let mediaRecorder = null;
let recordedChunks = [];

function startCamera() {
  if (!navigator.mediaDevices) return;
  navigator.mediaDevices.getUserMedia({ video:true, audio:true })
    .then(stream => {
      const vid = document.getElementById('cam');
      vid.srcObject = stream;
      document.getElementById('no-cam').style.display = 'none';
    })
    .catch(() => {});
}

function switchTab(name, el) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const map = { studio:'studio', scripts:'scripts-panel', files:'files-panel' };
  document.getElementById(map[name]).classList.add('active');
  if (el) el.classList.add('active');
  if (name === 'scripts') buildScriptsPanel();
}

function buildChooser() {
  const list = document.getElementById('chooser-list');
  list.innerHTML = '';
  scripts.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'script-btn';
    btn.innerHTML = `<div class="stitle">${s.id} — ${s.title}</div><div class="stype">${s.type}</div>`;
    btn.onclick = () => loadScript(s);
    list.appendChild(btn);
  });
}

function buildScriptsPanel() {
  const p = document.getElementById('scripts-panel');
  p.innerHTML = '';
  scripts.forEach(s => {
    const card = document.createElement('div');
    card.className = 'script-card';
    card.innerHTML = `<h3>${s.id} — ${s.title}</h3><p>${s.type}</p><button class="load-btn" onclick="loadScriptFromPanel('${s.id}')">LOAD IN STUDIO →</button>`;
    p.appendChild(card);
  });
}

function loadScriptFromPanel(id) {
  const s = scripts.find(x => x.id === id);
  if (s) { switchTab('studio', document.querySelector('.tab')); setTimeout(() => loadScript(s), 100); }
}

function loadScript(s) {
  currentScript = s;
  const inner = document.getElementById('scroll-inner');
  let html = s.body.replace(/\n/g, '<br>');
  if (s.twinFlame) html += `<div id="twin-flame">${s.twinFlame.replace(/\n/g,'<br>')}</div>`;
  inner.innerHTML = html;
  document.getElementById('scroll-zone').scrollTop = 0;
  document.getElementById('prog').style.width = '0%';
  document.getElementById('chooser').style.display = 'none';
  document.getElementById('prompter').classList.add('show');
  showNotif(`${s.id} LOADED — HIT PLAY`);
}

function exitPrompter() {
  stopScroll();
  isPlaying = false;
  document.getElementById('prompter').classList.remove('show');
  document.getElementById('chooser').style.display = 'flex';
  document.getElementById('play-btn').textContent = '▶ PLAY';
  document.getElementById('play-btn').classList.remove('playing');
}

function togglePlay() {
  isPlaying = !isPlaying;
  const btn = document.getElementById('play-btn');
  if (isPlaying) { btn.textContent = '⏸ PAUSE'; btn.classList.add('playing'); startScroll(); }
  else { btn.textContent = '▶ PLAY'; btn.classList.remove('playing'); stopScroll(); }
}

function startScroll() {
  stopScroll();
  const zone = document.getElementById('scroll-zone');
  scrollInterval = setInterval(() => {
    zone.scrollTop += speed * 0.8;
    const max = zone.scrollHeight - zone.clientHeight;
    document.getElementById('prog').style.width = Math.min(100, (zone.scrollTop / max) * 100) + '%';
    if (zone.scrollTop >= max) {
      stopScroll(); isPlaying = false;
      document.getElementById('play-btn').textContent = '▶ PLAY';
      document.getElementById('play-btn').classList.remove('playing');
      showNotif('✅ SCRIPT COMPLETE');
    }
  }, 16);
}

function stopScroll() {
  if (scrollInterval) { clearInterval(scrollInterval); scrollInterval = null; }
}

function changeSpeed(delta) {
  speed = Math.max(0.2, Math.min(5.0, speed + delta));
  document.getElementById('speed-display').textContent = speed.toFixed(1) + '×';
  if (isPlaying) { stopScroll(); startScroll(); }
}

function toggleRec() {
  if (!isRecording) startRec(); else stopRec();
}

function startRec() {
  const cam = document.getElementById('cam');
  if (!cam.srcObject) { showNotif('⚠️ Allow camera first'); return; }
  recordedChunks = [];
  mediaRecorder = new MediaRecorder(cam.srcObject);
  mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
  mediaRecorder.onstop = saveRecording;
  mediaRecorder.start();
  isRecording = true;
  document.getElementById('rec-btn').textContent = '⏹ STOP';
  document.getElementById('rec-dot').classList.add('on');
  showNotif('🔴 RECORDING...');
}

function stopRec() {
  if (mediaRecorder) mediaRecorder.stop();
  isRecording = false;
  document.getElementById('rec-btn').textContent = '⏺ REC';
  document.getElementById('rec-dot').classList.remove('on');
}

function saveRecording() {
  const blob = new Blob(recordedChunks, { type:'video/webm' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `anter_${currentScript ? currentScript.id : 'clip'}_${Date.now()}.webm`;
  a.click();
  showNotif('✅ SAVED TO DEVICE');
}

function saveApiKey() {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key) { showNotif('⚠️ Enter your API key first'); return; }
  localStorage.setItem('anter_udio_key', key);
  showNotif('✅ MUSIC ENGINE ACTIVATED');
}

function showNotif(msg) {
  const n = document.getElementById('notif');
  n.textContent = msg; n.classList.add('show');
  setTimeout(() => n.classList.remove('show'), 3000);
}

buildChooser();
startCamera();
</script>
</body>
</html>
